<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      color-scheme: light dark;
      --toolbar-height: 52px;
      --panel-bg: var(--vscode-editor-background);
      --panel-border: var(--vscode-editorWidget-border);
      --text: var(--vscode-editor-foreground);
      --muted: var(--vscode-descriptionForeground);
      --accent: var(--vscode-button-background);
      --accent-hover: var(--vscode-button-hoverBackground);
      --selection: rgba(220, 80, 80, 0.72);
      --selection-fill: rgba(220, 80, 80, 0.16);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--panel-bg);
      color: var(--text);
      font-family: var(--vscode-font-family);
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      height: var(--toolbar-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 14px;
      border-bottom: 1px solid var(--panel-border);
      background: color-mix(in srgb, var(--panel-bg) 88%, black 12%);
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    #actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px;
      font: inherit;
      color: var(--vscode-button-foreground);
      background: var(--accent);
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button.secondary {
      color: var(--text);
      background: transparent;
      border-color: var(--panel-border);
    }

    button.secondary:hover {
      background: color-mix(in srgb, var(--panel-bg) 80%, white 20%);
    }

    #status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      min-width: 0;
    }

    #status strong {
      font-size: 12px;
      font-weight: 600;
    }

    #status span {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48vw;
    }

    #shortcutHint {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: center;
      padding: 8px 14px 10px;
      border-bottom: 1px solid var(--panel-border);
      background: color-mix(in srgb, var(--panel-bg) 94%, white 6%);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    #shortcutHint span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    kbd {
      display: inline-block;
      min-width: 0;
      padding: 1px 6px;
      border: 1px solid var(--panel-border);
      border-bottom-color: color-mix(in srgb, var(--panel-border) 65%, black 35%);
      border-radius: 5px;
      background: color-mix(in srgb, var(--panel-bg) 82%, black 18%);
      color: var(--text);
      font: inherit;
      font-size: 10px;
      line-height: 1.3;
    }

    #viewport {
      flex: 1 1 auto;
      overflow: auto;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 20px 20px;
      box-sizing: border-box;
      min-height: 0;
    }

    #stage-shell {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    #stage {
      position: relative;
      display: inline-block;
      max-width: 100%;
      background: color-mix(in srgb, var(--panel-bg) 90%, white 10%);
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.22);
    }

    #screenshot {
      display: block;
      width: 100%;
      height: auto;
      max-width: min(100%, calc(100vw - 64px));
      max-height: calc(100vh - var(--toolbar-height) - 112px);
      object-fit: contain;
      cursor: crosshair;
      border-radius: 10px;
      user-select: none;
      -webkit-user-drag: none;
    }

    #selection {
      position: absolute;
      border: 1px dashed var(--selection);
      background: var(--selection-fill);
      pointer-events: none;
      box-sizing: border-box;
      display: none;
    }

    #selectionText {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--vscode-editor-font-family);
    }
  </style>
</head>

<body>
  <div id="toolbar">
    <div id="actions">
      <button id="startUpdate">Start Update</button>
      <button id="stopUpdate" class="secondary">Stop Update</button>
      <button id="updateOnce" class="secondary">Refresh Once</button>
      <button id="copy" class="secondary">Copy Coords</button>
      <button id="save" class="secondary">Save Crop</button>
      <button id="clean" class="secondary">Clean Crops</button>
    </div>
    <div id="status">
      <strong id="mouseCoords">Mouse: X: 0, Y: 0</strong>
      <span id="imageInfo">Image: loading...</span>
    </div>
  </div>

  <div id="shortcutHint">
    <span><kbd>Drag</kbd> Copy coordinates</span>
    <span><kbd>Ctrl</kbd>/<kbd>Cmd</kbd> + <kbd>Drag</kbd> Save template</span>
    <span><kbd>Click</kbd> Copy point coordinates</span>
  </div>

  <div id="viewport">
    <div id="stage-shell">
      <div id="stage">
        <img id="screenshot" src="${imageUrl}" alt="Screenshot">
        <div id="selection"></div>
      </div>
    </div>
    <div id="selectionText">(0, 0, 0, 0)</div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const screenshot = document.getElementById('screenshot');
    const selection = document.getElementById('selection');
    const selectionText = document.getElementById('selectionText');
    const mouseCoords = document.getElementById('mouseCoords');
    const imageInfo = document.getElementById('imageInfo');

    let isDragging = false;
    let isPointerDown = false;
    let hasMoved = false;
    let start = { x: 0, y: 0 };
    let end = { x: 0, y: 0 };
    let currentResolution = { width: 0, height: 0 };
    let activeMode = 'coords';

    function updateImageInfo() {
      if (!currentResolution.width || !currentResolution.height) {
        imageInfo.textContent = 'Image: loading...';
        return;
      }
      imageInfo.textContent = `Image: ${currentResolution.width} × ${currentResolution.height}`;
    }

    function clearSelection() {
      selection.style.display = 'none';
      selection.style.left = '0px';
      selection.style.top = '0px';
      selection.style.width = '0px';
      selection.style.height = '0px';
      selectionText.textContent = '(0, 0, 0, 0)';
    }

    function normalizeRect(a, b) {
      return {
        x: Math.min(a.x, b.x),
        y: Math.min(a.y, b.y),
        width: Math.abs(a.x - b.x),
        height: Math.abs(a.y - b.y),
      };
    }

    function getCurrentPos(event) {
      const rect = screenshot.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;
      const scaleX = screenshot.naturalWidth / rect.width;
      const scaleY = screenshot.naturalHeight / rect.height;
      return {
        x: Math.round(Math.max(0, Math.min(mouseX, rect.width)) * scaleX),
        y: Math.round(Math.max(0, Math.min(mouseY, rect.height)) * scaleY),
      };
    }

    function getSelectionText(rect) {
      return `(${rect.x}, ${rect.y}, ${rect.x + rect.width}, ${rect.y + rect.height})`;
    }

    function refreshSelectionPreview(current) {
      const rect = normalizeRect(start, current);
      const displayRect = screenshot.getBoundingClientRect();
      const scaleX = displayRect.width / screenshot.naturalWidth;
      const scaleY = displayRect.height / screenshot.naturalHeight;

      selection.style.display = 'block';
      selection.style.left = `${rect.x * scaleX}px`;
      selection.style.top = `${rect.y * scaleY}px`;
      selection.style.width = `${rect.width * scaleX}px`;
      selection.style.height = `${rect.height * scaleY}px`;
      selectionText.textContent = getSelectionText(rect);
    }

    function sendSelection(rect, croppedImage, mode) {
      vscode.postMessage({
        command: 'selectedArea',
        mode,
        pos: rect,
        resolution: currentResolution,
        content: croppedImage
      });
    }

    function sendPointSelection(point) {
      vscode.postMessage({
        command: 'selectedArea',
        mode: 'point',
        point
      });
    }

    screenshot.addEventListener('load', () => {
      currentResolution = {
        width: screenshot.naturalWidth,
        height: screenshot.naturalHeight
      };
      updateImageInfo();
      clearSelection();
    });

    screenshot.addEventListener('dragstart', (event) => event.preventDefault());
    screenshot.addEventListener('drop', (event) => event.preventDefault());

    screenshot.addEventListener('mousemove', (event) => {
      if (!isPointerDown) {
        const { x, y } = getCurrentPos(event);
        mouseCoords.textContent = `Mouse: X: ${x}, Y: ${y}`;
        return;
      }

      end = getCurrentPos(event);
      const deltaX = Math.abs(end.x - start.x);
      const deltaY = Math.abs(end.y - start.y);
      if (deltaX > 2 || deltaY > 2) {
        hasMoved = true;
        isDragging = true;
        refreshSelectionPreview(end);
      }
    });

    screenshot.addEventListener('mousedown', (event) => {
      if (!currentResolution.width || !currentResolution.height) {
        return;
      }

      activeMode = (event.metaKey || event.ctrlKey) ? 'template' : 'coords';
      isPointerDown = true;
      isDragging = false;
      hasMoved = false;
      start = getCurrentPos(event);
      end = start;
    });

    screenshot.addEventListener('mouseup', (event) => {
      if (!isPointerDown) {
        return;
      }

      isPointerDown = false;

      if (!hasMoved) {
        if (!event.metaKey && !event.ctrlKey && !event.shiftKey && !event.altKey) {
          sendPointSelection(start);
        }
        clearSelection();
        activeMode = 'coords';
        return;
      }

      if (!isDragging) {
        clearSelection();
        activeMode = 'coords';
        return;
      }

      isDragging = false;
      const rect = normalizeRect(start, end);
      const selectionMode = activeMode;

      if (rect.width === 0 || rect.height === 0) {
        clearSelection();
        activeMode = 'coords';
        return;
      }

      const crop = new Image();
      crop.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = rect.width;
        canvas.height = rect.height;
        const ctx = canvas.getContext('2d');

        ctx.drawImage(
          crop,
          rect.x,
          rect.y,
          rect.width,
          rect.height,
          0,
          0,
          rect.width,
          rect.height
        );

        sendSelection(rect, canvas.toDataURL('image/png'), selectionMode);
      };
      crop.src = screenshot.src;
      activeMode = 'coords';
    });

    document.getElementById('startUpdate').addEventListener('click', () => {
      vscode.postMessage({ command: 'startUpdate' });
    });

    document.getElementById('stopUpdate').addEventListener('click', () => {
      vscode.postMessage({ command: 'stopUpdate' });
    });

    document.getElementById('updateOnce').addEventListener('click', () => {
      vscode.postMessage({ command: 'updateOnce' });
    });

    document.getElementById('copy').addEventListener('click', () => {
      vscode.postMessage({
        command: 'copySelection',
        text: selectionText.textContent
      });
    });

    document.getElementById('save').addEventListener('click', () => {
      vscode.postMessage({ command: 'saveSelection' });
    });

    document.getElementById('clean').addEventListener('click', () => {
      vscode.postMessage({ command: 'cleanCropImage' });
    });

    window.addEventListener('message', (event) => {
      const message = event.data || {};
      if (message.command === 'refreshImage' && message.imageUrl) {
        screenshot.src = message.imageUrl;
        clearSelection();
      }
    });

    if (screenshot.complete && screenshot.naturalWidth) {
      currentResolution = {
        width: screenshot.naturalWidth,
        height: screenshot.naturalHeight
      };
      updateImageInfo();
    }

    updateImageInfo();
  </script>
</body>

</html>
